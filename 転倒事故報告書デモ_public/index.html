<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ポチって - 事故報告書デモ</title>
  <style>
    :root {
      --bg: #f7f7f4;
      --panel: #fff;
      --line: #e2e5ea;
      --muted: #667085;
      --ink: #0f172a;
      --brand: #00a3ad;
      --green: #10b981;
      --navy: #0f172a;
      --blue: #2563eb;
      --blue-soft: #eff6ff;
      --shadow: 0 1px 3px rgba(16, 24, 40, .12), 0 1px 2px rgba(16, 24, 40, .08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
      letter-spacing: 0;
    }
    button, input, select, textarea { font: inherit; }
    button {
      min-height: 42px;
      border: 1px solid #d9dde5;
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 9px 18px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { border-color: #bcc4d1; }
    .primary { border-color: var(--navy); background: var(--navy); color: #fff; }
    .teal { border-color: var(--brand); background: var(--brand); color: #fff; }
    .green { border-color: var(--green); background: var(--green); color: #fff; }
    .ghost { background: transparent; }
    .hidden { display: none !important; }

    .logo-line {
      height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 42px;
      background: #fff;
      border-bottom: 1px solid #eceff3;
    }
    .logo { display: flex; align-items: center; gap: 12px; color: var(--brand); font-weight: 900; font-size: 28px; }
    .logo-mark {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 6px;
      background: var(--brand);
      color: #fff;
      font-size: 18px;
    }
    .role { margin-left: 12px; border-radius: 999px; background: #fff4cc; color: #9a6700; padding: 4px 12px; font-size: 13px; }
    .facility { display: flex; align-items: center; gap: 18px; color: #475467; }
    .cache { color: var(--brand); border-color: #cfe7ea; }

    .page {
      width: min(1826px, calc(100vw - 70px));
      margin: 28px auto 60px;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 22px;
    }
    h1 { margin: 0; font-size: 32px; }
    .toolbar-actions { display: flex; flex-wrap: wrap; gap: 16px; }
    .table-wrap {
      overflow: hidden;
      border-radius: 14px;
      background: #fff;
    }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th, td { border-bottom: 1px solid #edf0f3; padding: 24px; text-align: left; font-size: 21px; vertical-align: middle; }
    th { color: #667085; font-size: 19px; font-weight: 800; }
    .pill { display: inline-flex; align-items: center; border-radius: 999px; padding: 4px 12px; background: #efe7ff; color: #6d28d9; font-weight: 900; font-size: 16px; }
    .row-actions { display: flex; gap: 10px; align-items: center; white-space: nowrap; }
    .small-btn { min-height: 38px; padding: 7px 14px; }
    .ok-btn { border-color: #bbf7d0; background: #f0fdf4; color: #15803d; }
    .blue-btn { border-color: #bae6fd; background: #f0f9ff; color: #0369a1; }
    .red-btn { border-color: #fecaca; background: #fff1f2; color: #dc2626; }
    .yellow-btn { border-color: #fde68a; background: #fffbeb; color: #a16207; }

    .wizard-shell {
      width: min(854px, calc(100vw - 40px));
      margin: 28px auto 60px;
    }
    .facility-label {
      margin: 0 0 12px;
      color: var(--brand);
      font-size: 14px;
      font-weight: 800;
    }
    .card {
      overflow: hidden;
      border: 1px solid #d9dde5;
      border-radius: 20px;
      background: #fff;
      box-shadow: var(--shadow);
    }
    .card-head {
      padding: 20px 28px 18px;
      border-bottom: 1px solid var(--line);
    }
    .step-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: 800; }
    .count { color: #667085; font-weight: 500; }
    .bar { height: 5px; border-radius: 999px; background: #e7ebf0; overflow: hidden; }
    .bar span { display: block; height: 100%; width: 10%; background: var(--green); border-radius: inherit; transition: width .2s ease; }
    .card-body { padding: 34px 32px 36px; }
    .card-foot {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 18px 28px;
      border-top: 1px solid var(--line);
      background: #f8fafc;
    }
    .foot-right { display: flex; gap: 12px; align-items: center; }
    .screen-title { margin: 0 0 28px; font-size: 30px; line-height: 1.35; }
    label { display: block; color: #667085; font-weight: 800; margin: 16px 0 8px; }
    input, select, textarea {
      width: 100%;
      border: 1px solid #d9dde5;
      border-radius: 12px;
      background: #fff;
      padding: 14px 16px;
      color: #111827;
    }
    input[readonly] { background: #f4f4f5; }
    textarea { min-height: 190px; resize: vertical; line-height: 1.7; }
    .form-grid { display: grid; gap: 12px; }
    .inline { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .inline select, .inline input { width: auto; min-width: 84px; }
    .seg { display: inline-flex; overflow: hidden; border-radius: 9px; background: #111827; padding: 4px; }
    .seg button { min-height: 34px; border: 0; border-radius: 7px; background: transparent; color: #cbd5e1; padding: 5px 14px; }
    .seg button.active { background: #fff; color: #111827; }

    .choices { display: grid; gap: 12px; }
    .two { grid-template-columns: 1fr 1fr; }
    .choice {
      position: relative;
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #e2e5ea;
      border-radius: 16px;
      background: #fff;
      font-size: 20px;
      font-weight: 900;
      text-align: center;
    }
    .choice.row {
      justify-content: space-between;
      padding: 16px 18px;
      min-height: 54px;
      font-size: 16px;
      text-align: left;
    }
    .choice.selected {
      border-color: var(--blue);
      background: var(--blue-soft);
      color: var(--blue);
    }
    .choice.selected::after {
      content: "✓";
      position: absolute;
      right: 14px;
      top: 14px;
      display: grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--blue);
      color: #fff;
      font-size: 17px;
    }
    .choice-card {
      border: 2px solid #e2e5ea;
      border-radius: 12px;
      background: #fff;
      overflow: hidden;
    }
    .choice-card.selected { border-color: var(--blue); background: var(--blue-soft); }
    .choice-card .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 18px;
      font-weight: 900;
    }
    .choice-card .sub {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 14px 18px;
      background: rgba(255,255,255,.55);
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #d9dde5;
      border-radius: 999px;
      background: #fff;
      padding: 8px 13px;
      font-weight: 800;
      cursor: pointer;
    }
    .chip.selected {
      border-color: var(--blue);
      background: #eef5ff;
      color: var(--blue);
    }

    .ai-box {
      border: 1px solid #a9cdfd;
      border-radius: 12px;
      background: #eff6ff;
      padding: 16px;
      margin-bottom: 24px;
    }
    .ai-box h3 { margin: 0 0 12px; font-size: 14px; }
    .ai-box .generate {
      min-height: 36px;
      margin-bottom: 14px;
      padding: 7px 13px;
      border-color: #2563eb;
      background: #2563eb;
      color: #fff;
      font-size: 13px;
    }

    .body-map {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
      padding: 16px 14px 8px;
      margin: 12px 0 10px;
      text-align: center;
    }
    .image-choice {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 174px;
      padding: 18px;
    }
    .image-crop {
      width: 158px;
      height: 112px;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 12px;
      background: #eef2f7;
    }
    .image-crop img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .wide-choice {
      grid-column: 1 / -1;
    }

    .body-stage {
      position: relative;
      min-height: 356px;
      overflow: hidden;
    }
    .body-stage svg,
    .body-stage img {
      width: min(470px, 100%);
      height: auto;
      display: block;
      margin: 0 auto;
    }
    .body-note { margin: 8px 0 0; color: #a6adba; font-weight: 800; }
    .selected-parts {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      border-radius: 12px;
      background: #fff;
      padding: 13px;
      margin-bottom: 10px;
    }
    .part-tag {
      border-radius: 999px;
      border: 1px solid currentColor;
      background: color-mix(in srgb, currentColor 12%, white);
      padding: 7px 12px;
      font-weight: 900;
    }
    .parts-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px 28px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #f8fafc;
      padding: 16px;
    }
    .part-row { display: flex; align-items: center; gap: 9px; font-weight: 800; }
    .swatch { width: 14px; height: 14px; border-radius: 4px; display: inline-block; }
    .photo-block {
      border-radius: 12px;
      padding: 14px 18px 18px;
      margin-top: 12px;
      background: #f6e8f4;
      border-left: 5px solid #db2777;
    }
    .photo-block:nth-child(even) { background: #eee9ff; border-color: #7c3aed; }
    .photo-actions { display: flex; gap: 12px; margin: 12px 0; }
    .dash { border-style: dashed; }

    .final-report {
      border: 1px solid #bfdbfe;
      border-radius: 16px;
      background: #eff6ff;
      padding: 22px;
      line-height: 1.9;
    }
    .report-table {
      width: 100%;
      margin-bottom: 18px;
      border-collapse: collapse;
      background: #f8fbff;
    }
    .report-table th, .report-table td { font-size: 14px; border: 1px solid #dbeafe; padding: 9px 10px; }
    .report-lead {
      margin: 4px 0 16px;
      color: #334155;
      font-size: 14px;
      line-height: 1.8;
    }
    .final-generate {
      border: 0;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      font-weight: 800;
      padding: 12px 18px;
      margin-bottom: 18px;
    }
    .report-section-title {
      margin: 10px 0 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #111827;
      font-size: 20px;
    }
    .report-table.basic th {
      width: 28%;
      color: #475467;
      background: #f1f5f9;
      text-align: left;
    }
    .report-table.basic td { background: #f8fbff; }
    .report-body-title { margin: 18px 0 8px; font-size: 18px; }
    .report-text-box {
      border: 1px solid #dbeafe;
      border-radius: 10px;
      background: #fff;
      padding: 16px;
    }
    .report-text { white-space: pre-wrap; font-size: 16px; }
    .ai-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 10px 0 14px;
    }
    .ai-progress {
      display: none;
      min-width: 220px;
      border: 1px solid #99f6e4;
      border-radius: 10px;
      background: #f0fdfa;
      padding: 10px 12px;
      color: #0f766e;
      font-weight: 900;
    }
    .ai-progress.active { display: block; }
    .ai-bar {
      height: 10px;
      border-radius: 999px;
      background: #e5e7eb;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .ai-bar span {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: #5eead4;
      transition: width .15s linear;
    }
    .generate.generating {
      background: #9db7f5;
      cursor: progress;
    }
    .cancel-generate {
      border: 1px solid #f87171;
      color: #ef4444;
      background: #fff;
    }
    .stamp-table {
      width: 100%;
      margin-top: 26px;
      border-collapse: collapse;
      table-layout: fixed;
      background: #fff;
    }
    .stamp-table th, .stamp-table td {
      border: 2px solid #2f2f2f;
      text-align: center;
      vertical-align: middle;
      font-size: 13px;
      font-weight: 900;
      padding: 9px 6px;
    }
    .stamp-table td { height: 42px; }
    .detail-field { margin: 12px 0 18px; }
    .detail-field label {
      display: block;
      margin-bottom: 8px;
      color: #2563eb;
      font-size: 13px;
      font-weight: 900;
    }
    .detail-field input {
      width: 100%;
      border: 1px solid #d7dde7;
      border-radius: 10px;
      padding: 13px 14px;
      font-size: 15px;
      background: #fff;
    }
    .inline-check {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .inline-check input { flex: 1; }

    @media (max-width: 900px) {
      .logo-line { padding-inline: 16px; overflow: auto; }
      .page { width: min(100vw - 24px, 860px); }
      th, td { padding: 16px 10px; font-size: 15px; }
      .toolbar { align-items: flex-start; flex-direction: column; }
      .two, .parts-list { grid-template-columns: 1fr; }
      .card-body { padding: 24px 18px; }
      .card-foot { padding: 14px; }
    }
  </style>
</head>
<body>

      <div class="card-head">

    async function hydrateBodyObjects() {
      const containers = document.querySelectorAll(".body-svg-container");
      if (!containers.length) return;
      if (!bodySvgText) {
        try {
          const response = await fetch("資料/部位選択/image (1).svg");
          bodySvgText = await response.text();
        } catch (error) {
          bodySvgText = "";
        }
      }
      containers.forEach((container) => {
        if (bodySvgText) {
          container.innerHTML = bodySvgText;
          paintBodySvg(container);
        } else {
          container.innerHTML = `<img src="資料/部位選択/image (1).svg" alt="人体図">`;
        }
      });
    }

    function paintBodySvg(container) {
      const partsKey = container.dataset.partsKey;
      const selected = state.selected[partsKey] || [];
      const paths = Array.from(container.querySelectorAll("path"));
      paths.forEach((path, index) => {
        const part = pathToPart[index];
        path.style.transition = "fill .12s ease, opacity .12s ease";
        path.style.cursor = part ? "pointer" : "default";
        if (!part) return;
        const isSelected = selected.includes(part);
        path.style.fill = isSelected ? colorFor(part) : "#f8fafc";
        path.style.fillOpacity = isSelected ? "0.86" : "1";
        path.style.stroke = isSelected ? "#334155" : "#aab7c7";
        path.style.strokeWidth = isSelected ? "1.3" : "0.9";
        path.onclick = (event) => {
          event.preventDefault();
          event.stopPropagation();
          togglePart(partsKey, part);
        };
      });
    }

    function togglePart(partsKey, part) {
      state.selected[partsKey] = state.selected[partsKey] || [];
      state.selected[partsKey] = state.selected[partsKey].includes(part)
        ? state.selected[partsKey].filter((p) => p !== part)
        : [...state.selected[partsKey], part];
      render();
    }

何かご不明な点やご心配なことがございましたら、いつでもお電話ください。`;
      }
      return `突然のお電話失礼いたします。テスト施設でございます。${state.basic.name}様のご家族様でいらっしゃいますでしょうか。念のためご様子のご報告としてお電話いたしました。

本日朝、食堂・デイルームにて${state.basic.name}様が床に倒れている状態で発見されました。職員が巡回時に確認した昨日朝にはお変わりない状態でした。発生時の状況は不明ですが、外傷や出血は確認されませんでした。${state.basic.name}様に声をかけたところ、すぐに反応がありましたが、会話は成立しておりません。

現在、${state.basic.name}様の様子を観察しております。また、病院にも連絡し、指示を仰いだところ、様子観察となりました。ご家族様にもご連絡し、現在の状況をご説明したところ、理解をいただきました。今後、状況に変化があれば再度ご連絡させていただきます。

何かご不明な点やご心配なことがございましたら、いつでもお電話ください。`;
    }

    function renderReport() {
      const witnessed = state.selected.witness.includes("はい");
      const reportText = witnessed ? witnessedReportText() : unwitnessedReportText();
      return `<h2 class="screen-title">最終報告書の作成</h2>
        <div class="final-report">
          <h3>最終報告書（AI生成）</h3>
          <p class="report-lead">前段で作成した内部共有文・連絡文を統合し、最終報告書をAIが作成します。氏名・施設名は送信前に自動で匿名化されます。</p>
          <button class="final-generate" type="button">最終報告書を生成</button>
          <h3 class="report-section-title">基本情報</h3>

            <tr><th>施設名</th><td>テスト施設</td></tr>
            <tr><th>利用者</th><td>${state.basic.name}</td></tr>
            <tr><th>生年月日</th><td>${state.basic.birth}</td></tr>
            <tr><th>性別</th><td>${state.basic.gender}</td></tr>
            <tr><th>事故発生日時</th><td>${state.basic.incidentAt}</td></tr>
            <tr><th>発生場所</th><td>居室</td></tr>

            <tr><th>発見場所</th><td>居室</td></tr>
            <tr><th>事故種別</th><td>${state.selected.kind || "転倒疑い"}</td></tr>
            <tr><th>インシデント区分</th><td>転倒（転落含む）</td></tr>
            <tr><th>第一発見者</th><td>${state.basic.finder}</td></tr>
            <tr><th>上長への報告</th><td>報告済み</td></tr>
            <tr><th>医療機関への連絡</th><td>連絡済み</td></tr>
            <tr><th>ご家族への連絡</th><td>連絡済み</td></tr>
          </table>
          <h3 class="report-body-title">報告書本文</h3>
          <div class="report-text-box"><div class="report-text">${reportText}</div>${stampTable()}</div>

    }

    function stampTable() {
      return `<table class="stamp-table" aria-label="確認印欄">
        <tr><th>施設長</th><th>事務長</th><th>相談員<br>ケアマネ</th><th>医務/看護</th><th>栄養士</th><th>介護主任</th><th>介護主任</th><th>介護主任</th><th>報告者</th></tr>
        <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
      </table>`;
    }

    function witnessedReportText() {
      return `〈事故概要〉
入居者の${state.basic.name}（${state.basic.age}代・${state.basic.gender}）が、${state.basic.incidentAt}、トイレ内で転倒されました。第一発見者は${state.basic.finder}で、転倒の瞬間を目撃しました。転倒時は歩行介助中であり、歩行器を使用されていました。周囲の環境要因は認められませんでした。

〈状況と対応〉
転倒時、${state.basic.finder}が直ちに対応しました。${state.basic.name}様はすぐに呼びかけに反応し、会話も成立していました。初期対応として状況観察を実施しました。報告フローは実施され、${state.basic.finder}が管理者へ報告しました。また、医療機関にも連絡し、指示は様子観察となりました。ご家族にも連絡し、説明内容について理解が得られました。

〈外傷と身体状態〉
${state.basic.name}様は痛みの訴えはありませんでしたが、出血が確認されました。意識状態は良好で、呼びかけにすぐ反応し、会話も成立していました。

〈環境要因〉
特記すべき環境要因は認められませんでした。

〈原因分析と再発防止策〉
転倒は歩行介助中に発生しましたが、転倒の直接的な原因は特定できませんでした。今後の対策として、歩行介助時のリスク評価をより詳細に行い、必要に応じて追加のサポートを検討します。また、職員間の情報共有を強化し、転倒リスクの高い入居者への対応を改善します。予見困難な事例として整理します。

〈総括〉
${state.basic.name}様の転倒事故に対して迅速な対応が取られ、医療機関とご家族にも連絡がされました。今後の対応については、リスク評価の強化と職員間の情報共有の改善を図ります。`;
    }

    function unwitnessedReportText() {
      return `〈事故概要〉
入居者の${state.basic.name}様、${state.basic.age}代・${state.basic.gender}が${state.basic.incidentAt}、食堂・デイルームの床に倒れている状態で発見されました。最後に無事を確認したのは前日の巡回時で、その時は異常は確認されませんでした。

〈状況と対応〉
発見時、${state.basic.name}様は床に倒れており、呼びかけにすぐに反応しましたが、会話は成立していませんでした。初期対応として状況観察が実施されました。報告フローは実施され、${state.basic.finder}が管理者へ報告しました。医療機関連絡は看護職により行われ、医療機関からは様子観察の指示を受けました。ご家族への連絡も行われ、理解が得られ、医療機関受診は行わない方針となりました。

〈外傷と身体状態〉
痛みの訴えはなく、外傷や出血は確認されませんでした。意識状態は呼びかけにすぐ反応しましたが、言語応答は会話が成立していませんでした。

〈環境要因〉
特記すべき環境要因は認められませんでした。

〈原因分析と再発防止策〉
今回の事例は予見困難な事例と判断されます。発生時の状況が不明であり、外傷や痛みの訴えがなかったことから、突発的な体調変化が考えられます。今後の対策として、巡回時の確認をさらに徹底し、入居者の様子に異変がないか常に注意を払うこととします。また、職員間の情報共有を強化し、入居者の日々の状態変化に敏感に対応できるよう努めます。

〈総括〉
${state.basic.name}様が食堂・デイルームの床に倒れている状態で発見され、状況観察と医療機関への連絡を行い、ご家族にも連絡しました。医療機関からは様子観察の指示を受け、ご家族とも合意を得て対応しました。`;
    }

    function bindStep(id) {
      document.querySelectorAll("[data-key]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const key = btn.dataset.key;
          const value = btn.dataset.value;
          if (btn.dataset.multi === "1") {
            state.selected[key] = state.selected[key] || [];
            state.selected[key] = state.selected[key].includes(value) ? state.selected[key].filter((v) => v !== value) : [...state.selected[key], value];
          } else {
            state.selected[key] = value;
            if (key === "witness") {
              state.generatedTexts = {};
              ensureRouteByWitness();
            }
          }
          render();
        });
      });
      document.querySelectorAll("[data-card-key]").forEach((card) => {
        card.addEventListener("click", (e) => {
          if (e.target.closest("[data-chip-key]") || e.target.closest("input") || e.target.closest("textarea") || e.target.closest("button")) return;
          state.selected[card.dataset.cardKey] = card.dataset.cardValue;
          render();
        });
      });
      document.querySelectorAll("[data-chip-key]").forEach((chipEl) => {
        chipEl.addEventListener("click", (e) => {
          e.stopPropagation();
          const key = chipEl.dataset.chipKey;
          const value = chipEl.dataset.chipValue;
          state.selected[key] = state.selected[key] || [];
          state.selected[key] = state.selected[key].includes(value) ? state.selected[key].filter((v) => v !== value) : [...state.selected[key], value];
          render();
        });
      });
      document.querySelectorAll("[data-part]").forEach((box) => {
        box.addEventListener("change", () => {
          const part = box.dataset.part;
          const partsKey = box.dataset.partsKey;
          state.selected[partsKey] = state.selected[partsKey] || [];
          state.selected[partsKey] = box.checked ? [...new Set([...state.selected[partsKey], part])] : state.selected[partsKey].filter((p) => p !== part);
          render();
        });
      });
      document.querySelectorAll("[data-remove-part]").forEach((tag) => {
        tag.addEventListener("click", (e) => {
          e.stopPropagation();
          const partsKey = tag.dataset.partsKey;
          const part = tag.dataset.removePart;
          state.selected[partsKey] = (state.selected[partsKey] || []).filter((p) => p !== part);
          render();
        });
      });
      document.querySelectorAll("[data-clear-parts]").forEach((clear) => {
        clear.addEventListener("click", (e) => {
          e.stopPropagation();
          state.selected[clear.dataset.clearParts] = [];
          render();
        });
      });
      document.querySelectorAll("[data-generate-key]").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          generateAiText(btn.dataset.generateKey, btn.dataset.ai === "1");
        });
      });
      const name = document.getElementById("nameInput");
      if (name) name.addEventListener("input", () => { state.basic.name = name.value || "サンプル太郎"; });
      const gender = document.getElementById("genderInput");
      if (gender) gender.addEventListener("change", () => { state.basic.gender = gender.value; });
    }

    function generatedTextFor(key) {
      if (key === "inside") return insideText();
      if (key === "medical") return medicalText();
      if (key === "family") return familyText();
      return "";
    }

    function generateAiText(key, ai) {
      const box = document.querySelector(`[data-ai-box="${key}"]`);
      if (!box) return;
      const textarea = box.querySelector(`[data-textarea-key="${key}"]`);
      const button = box.querySelector(`[data-generate-key="${key}"]`);
      const progress = box.querySelector(`[data-progress-key="${key}"]`);
      const bar = progress?.querySelector(".ai-bar span");
      const label = progress?.querySelector(".ai-progress-label");
      const text = generatedTextFor(key);

      if (!ai) {
        state.generatedTexts[key] = text;
        render();
        return;
      }

      textarea.value = "";
      button.disabled = true;
      button.classList.add("generating");
      button.textContent = "生成中...";
      progress.classList.add("active");

      const start = Date.now();
      const duration = 1900;
      const tick = () => {
        const elapsed = Date.now() - start;
        const ratio = Math.min(1, elapsed / duration);
        const eased = 1 - Math.pow(1 - ratio, 2);
        const percent = Math.min(99, Math.max(7, Math.round(7 + eased * 91)));
        const seconds = Math.max(1, Math.ceil(elapsed / 1000));
        bar.style.width = `${percent}%`;
        label.textContent = `${percent}%生成中...（${seconds}秒経過）`;
        if (ratio < 1) {
          requestAnimationFrame(tick);
          return;
        }
        state.generatedTexts[key] = text;
        render();
      };
      requestAnimationFrame(tick);
    }

    document.getElementById("newReport").addEventListener("click", start);
    document.getElementById("cancelBtn").addEventListener("click", showList);
    document.getElementById("draftBtn").addEventListener("click", () => {});
    document.getElementById("backBtn").addEventListener("click", () => { if (state.index > 0) { state.index -= 1; render(); } });
    document.getElementById("nextBtn").addEventListener("click", () => {
      if (currentId() === "basic" && state.route.length === 2) state.route = ["basic", "witness"];
      if (currentId() === "witness") ensureRouteByWitness();
      if (currentId() === "report") { showList(); return; }
      if (state.index < state.route.length - 1) {
        state.index += 1;
        render();
      }
    });
  </script>
